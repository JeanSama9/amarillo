<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Una mini web romántica con flores amarillas, contador de amor y una tarjeta animada para compartir."
    />
    <title>Flores Para Ti</title>
    <link
      rel="icon"
      type="image/svg+xml"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Cpath fill='%238a2be2' d='M32 56 10 35C3 28 3 16 11 10c7-5 16-3 21 4 5-7 14-9 21-4 8 6 8 18 1 25L32 56Z'/%3E%3C/svg%3E"
    />
    <link rel="stylesheet" href="./css/style.css" />
  </head>
  <body>
    <div class="background-grain" aria-hidden="true"></div>
    <div class="background-glow background-glow--one" aria-hidden="true"></div>
    <div class="background-glow background-glow--two" aria-hidden="true"></div>
    <div class="background-hearts" aria-hidden="true">
      <span class="heart-blur heart-blur--1"></span>
      <span class="heart-blur heart-blur--2"></span>
      <span class="heart-blur heart-blur--3"></span>
      <span class="heart-blur heart-blur--4"></span>
      <span class="heart-blur heart-blur--5"></span>
    </div>

    <main class="romantic-experience">
      <section class="cover-screen" id="coverScreen" aria-labelledby="coverTitle">
        <button
          class="cover-screen__button"
          id="openExperience"
          type="button"
          aria-describedby="coverHint"
        >
          <span class="cover-screen__ring cover-screen__ring--one" aria-hidden="true"></span>
          <span class="cover-screen__ring cover-screen__ring--two" aria-hidden="true"></span>
          <span class="cover-screen__flower" aria-hidden="true">🌻</span>
          <span class="cover-screen__eyebrow">Un detalle para tu corazón</span>
          <h1 class="cover-screen__title" id="coverTitle">Flores Para Ti</h1>
          <p class="cover-screen__subtitle">
            Una carta hecha de tiempo, ternura y flores amarillas.
          </p>
          <span class="cover-screen__hint" id="coverHint">Toca para abrir la carta</span>
        </button>
      </section>

      <section
        class="love-card"
        id="loveCard"
        aria-labelledby="cardTitle"
        aria-hidden="true"
        tabindex="-1"
      >
        <div class="love-card__inner">
          <div class="love-card__aura" aria-hidden="true"></div>
          <div class="love-card__corner love-card__corner--top" aria-hidden="true"></div>
          <div class="love-card__corner love-card__corner--bottom" aria-hidden="true"></div>
          <div class="love-card__petals" id="petalLayer" aria-hidden="true"></div>

          <div class="love-card__content">
            <div class="message-block">
              <p class="message-block__label">Para mi persona favorita</p>
              <h2 class="message-block__title" id="cardTitle">
                Flores Amarillas para el amor de mi vida:
              </h2>
              <p class="message-block__text">
                Si pudiera elegir un lugar seguro, sería a tu lado.
              </p>
              <p class="message-block__text">
                Cuanto más tiempo estoy contigo, más te amo.
              </p>

              <div class="message-block__seal" aria-hidden="true">
                <span></span>
                <span></span>
                <span></span>
              </div>

              <div class="counter-block" aria-live="polite">
                <p class="counter-block__date" id="counterDateText"></p>
                <p class="counter-block__label">Mi amor por ti comenzó hace...</p>
                <div class="counter-grid" id="timeCounter">
                  <article class="time-unit">
                    <span class="time-unit__value" id="days">000</span>
                    <span class="time-unit__label">días</span>
                  </article>
                  <article class="time-unit">
                    <span class="time-unit__value" id="hours">00</span>
                    <span class="time-unit__label">horas</span>
                  </article>
                  <article class="time-unit">
                    <span class="time-unit__value" id="minutes">00</span>
                    <span class="time-unit__label">min</span>
                  </article>
                  <article class="time-unit">
                    <span class="time-unit__value" id="seconds">00</span>
                    <span class="time-unit__label">seg</span>
                  </article>
                </div>
              </div>
            </div>

            <div class="visual-block" aria-label="Árbol con corazón de flores amarillas">
              <div class="visual-block__halo" aria-hidden="true"></div>
              <svg
                class="flower-tree"
                viewBox="0 0 360 400"
                role="img"
                aria-labelledby="treeTitle treeDesc"
              >
                <title id="treeTitle">Árbol de flores amarillas con copa en forma de corazón</title>
                <desc id="treeDesc">
                  Ilustración decorativa de un árbol romántico con un tronco marrón y una copa con forma de
                  corazón hecha de flores amarillas.
                </desc>

                <defs>
                  <radialGradient id="treeGlow" cx="50%" cy="42%" r="70%">
                    <stop offset="0%" stop-color="#fff8d6" />
                    <stop offset="100%" stop-color="#f4cf52" />
                  </radialGradient>
                  <linearGradient id="trunkShade" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" stop-color="#8b5337" />
                    <stop offset="100%" stop-color="#5a2c18" />
                  </linearGradient>
                  <filter id="softShadow" x="-20%" y="-20%" width="140%" height="160%">
                    <feDropShadow dx="0" dy="8" stdDeviation="7" flood-color="#af6c2c" flood-opacity="0.22" />
                  </filter>
                  <g id="miniFlower">
                    <circle r="6.8" fill="#ffd24f" />
                    <g fill="#f7c425">
                      <ellipse rx="4.2" ry="8.5" transform="rotate(0)" />
                      <ellipse rx="4.2" ry="8.5" transform="rotate(45)" />
                      <ellipse rx="4.2" ry="8.5" transform="rotate(90)" />
                      <ellipse rx="4.2" ry="8.5" transform="rotate(135)" />
                    </g>
                    <circle r="3.2" fill="#6e491a" />
                  </g>
                  <path
                    id="heartPath"
                    d="M180 92
                      C150 38, 74 40, 62 102
                      C54 150, 90 188, 125 218
                      C148 238, 166 254, 180 269
                      C194 254, 212 238, 235 218
                      C270 188, 306 150, 298 102
                      C286 40, 210 38, 180 92Z"
                  />
                </defs>

                <ellipse class="flower-tree__ground" cx="182" cy="346" rx="108" ry="24" />

                <g class="flower-tree__trunk" filter="url(#softShadow)">
                  <path
                    d="M172 322
                      C166 276, 160 250, 166 224
                      C171 202, 183 188, 183 162
                      C183 148, 176 136, 166 126
                      C183 130, 195 140, 202 154
                      C212 173, 209 196, 212 217
                      C215 243, 231 272, 224 322Z"
                    fill="url(#trunkShade)"
                  />
                  <path
                    d="M182 194
                      C149 192, 133 178, 120 146
                      C141 152, 161 165, 176 185"
                    fill="none"
                    stroke="#6b3921"
                    stroke-width="12"
                    stroke-linecap="round"
                  />
                  <path
                    d="M191 188
                      C222 179, 239 159, 249 129
                      C231 137, 212 153, 196 181"
                    fill="none"
                    stroke="#6b3921"
                    stroke-width="11"
                    stroke-linecap="round"
                  />
                </g>

                <use href="#heartPath" class="flower-tree__heart-base" fill="url(#treeGlow)" opacity="0.32" />

                <g class="flower-tree__blossoms">
                  <use href="#miniFlower" x="178" y="86" />
                  <use href="#miniFlower" x="154" y="76" />
                  <use href="#miniFlower" x="206" y="79" />
                  <use href="#miniFlower" x="126" y="87" />
                  <use href="#miniFlower" x="233" y="90" />
                  <use href="#miniFlower" x="102" y="109" />
                  <use href="#miniFlower" x="257" y="110" />
                  <use href="#miniFlower" x="88" y="135" />
                  <use href="#miniFlower" x="273" y="136" />
                  <use href="#miniFlower" x="104" y="161" />
                  <use href="#miniFlower" x="255" y="161" />
                  <use href="#miniFlower" x="123" y="186" />
                  <use href="#miniFlower" x="235" y="188" />
                  <use href="#miniFlower" x="145" y="205" />
                  <use href="#miniFlower" x="214" y="207" />
                  <use href="#miniFlower" x="177" y="220" />
                  <use href="#miniFlower" x="177" y="105" />
                  <use href="#miniFlower" x="144" y="103" />
                  <use href="#miniFlower" x="213" y="105" />
                  <use href="#miniFlower" x="118" y="122" />
                  <use href="#miniFlower" x="240" y="123" />
                  <use href="#miniFlower" x="129" y="147" />
                  <use href="#miniFlower" x="229" y="148" />
                  <use href="#miniFlower" x="155" y="137" />
                  <use href="#miniFlower" x="203" y="138" />
                  <use href="#miniFlower" x="177" y="142" />
                  <use href="#miniFlower" x="153" y="163" />
                  <use href="#miniFlower" x="201" y="163" />
                  <use href="#miniFlower" x="178" y="174" />
                  <use href="#miniFlower" x="162" y="190" />
                  <use href="#miniFlower" x="194" y="192" />
                  <use href="#miniFlower" x="135" y="116" />
                  <use href="#miniFlower" x="221" y="117" />
                  <use href="#miniFlower" x="111" y="141" />
                  <use href="#miniFlower" x="247" y="143" />
                  <use href="#miniFlower" x="138" y="219" />
                  <use href="#miniFlower" x="220" y="220" />
                  <use href="#miniFlower" x="161" y="231" />
                  <use href="#miniFlower" x="194" y="231" />
                </g>

                <g class="flower-tree__sparkles">
                  <circle cx="104" cy="77" r="4" />
                  <circle cx="252" cy="85" r="3.2" />
                  <circle cx="79" cy="166" r="3.8" />
                  <circle cx="281" cy="173" r="3.2" />
                  <circle cx="179" cy="59" r="3.5" />
                </g>
              </svg>
            </div>
          </div>

          <div class="love-card__footer-line" aria-hidden="true"></div>
        </div>
      </section>
    </main>

    <script src="./js/app.js"></script>
  </body>
</html>
